name: DMX Price Scraper Cron (Every 2 Hours)

on:
  schedule:
    # Runs automatically every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 gspread google-auth urllib3

      - name: Run DMX Price Scraper & Alert
        env:
          PYTHONIOENCODING: "utf-8"
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ENABLE_TELEGRAM: ${{ secrets.ENABLE_TELEGRAM }}
        run: |
          python main.py

      - name: Commit and Push Price History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add price_history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update price history [GMT+7]" && git push)
